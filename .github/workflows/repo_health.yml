name: Security & Repository Health Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write # Required to allow GitHub Actions to commit fixes back to main

jobs:
  security-and-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Gitleaks & git auto-commit

      # 1. Scan for exposed secrets (uses .gitleaks.toml allowlist)
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Auto-fix Python linter warnings (strips extraneous f-prefixes)
      - name: Run Ruff Linter and Auto-Fix
        run: |
          pip install ruff
          ruff check --fix *.py

      # 4. Commit and push cleaned Python files back to the repo
      - name: Commit Ruff Cleanups
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix Python linter warnings via Ruff [skip ci]"
          file_pattern: "*.py"

      # 5. Verify syntax integrity of raw JSON data files
      - name: Validate Data JSON Integrity
        run: |
          python -c "
          import glob, json
          json_files = glob.glob('data/*.json')
          for f in json_files:
              with open(f, 'r', encoding='utf-8') as fp:
                  json.load(fp)
          print(f'✅ Successfully validated syntax for {len(json_files)} JSON file(s).')
          "

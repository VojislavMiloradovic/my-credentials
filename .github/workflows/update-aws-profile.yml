name: Update AWS Learn Profile

on:
  push:
    paths:
      - 'data/aws-training-activity.csv' # Triggers immediately when you update your AWS CSV
  workflow_dispatch: # Allows you to trigger manually with a button click

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run AWS Profile Parser
      run: python update_aws_skills.py

    - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update credential chunks"
          git push

name: Update AWS Learn Profile

on:
  push:
    paths:
      - 'data/aws-training-activity.csv' # Triggers immediately when you update your AWS CSV
  workflow_dispatch: # Allows you to trigger manually with a button click

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run AWS Profile Parser
      run: python update_aws_skills.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # Track the new archive location
        git add README.md archives/aws-skills.md
        
        # Check if there are actual changes staged before committing
        if ! git diff --cached --exit-code; then
          git commit -m "docs(aws): sync latest AWS Skill Builder history and credentials archive"
          git push
        else
          echo "No changes to commit. AWS profile is up to date."
        fi

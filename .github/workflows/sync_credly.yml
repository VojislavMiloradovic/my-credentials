name: Sync Credly Profile

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight to keep everything up to date
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Credly Scraper
        run: python update_credly_badges.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md archives/credly-badges.md
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: sync latest verified credentials and skills from Credly"
            git push
          fi

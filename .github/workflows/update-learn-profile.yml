name: Update MS Learn Profile

on:
  push:
    paths:
      - 'data/microsoft-learn.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Profile Parser
      run: python update_ms_learn.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # Track the new archive location
        git add README.md archives/microsoft-learn.md
        
        # Check if there are actual changes staged before committing
        if ! git diff --cached --exit-code; then
          git commit -m "docs(profile): sync latest AI-readable credentials and achievements archive"
          git push
        else
          echo "No changes to commit. Everything is up to date."
        fi

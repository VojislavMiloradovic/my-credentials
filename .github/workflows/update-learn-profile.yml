name: Update MS Learn Profile

on:
  push:
    paths:
      - 'data/microsoft-learn.json' # Triggers immediately when you update the json file
  workflow_dispatch: # Allows you to run it manually with a single click

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Profile Parser
      run: python update_ms_learn.py

    - name: Commit and Push Changes
      uses: actions/github-script@v7
      with:
        script: |
          const exec = require('@actions/exec');
          await exec.exec('git config --global user.name "github-actions[bot]"');
          await exec.exec('git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"');
          await exec.exec('git add README.md data/all_achievements.md');
          try {
            await exec.exec('git commit -m "docs(profile): sync latest AI-readable credentials and achievements archive"');
            await exec.exec('git push');
          } catch (error) {
            console.log("No changes to commit.");
          }

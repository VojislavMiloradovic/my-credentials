name: Update Google Developer Credentials

on:
  schedule:
    # Runs at 00:00 UTC every 2 days (every 48 hours)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repository

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/models/setup-python@v5
      with:
        python-base: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Google Developer Sync Script
      run: python update_google_developer.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if there are changes to avoid empty commits
        if [ -n "$(git status --porcelain)" ]; then
          git add README.md archives/google-developer.md
          git commit -m "chore: auto-update Google Developer profile credentials [skip ci]"
          git push
          echo "✅ Changes committed and pushed successfully."
        else
          echo "ℹ️ No new credentials found. Repository is up to date."
        fi

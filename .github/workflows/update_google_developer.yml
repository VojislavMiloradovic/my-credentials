name: Update Google Developer Credentials

on:
  schedule:
    # Runs at 00:00 UTC every 2 days (every 48 hours)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repository
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Google Developer Sync Script
        run: python update_google_developer.py

      - name: Generate LLMs.txt Directory Files
        run: python generate_llms_txt.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update credentials and llms.txt"
          git push

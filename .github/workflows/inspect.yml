name: Inspect Microsoft Learn Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Inspector Script
        run: python inspect_data.py

      - name: Commit Structure Summary
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ # This will now grab BOTH the summary and the repaired JSON!
          git commit -m "chore: auto-repair JSON and update structure summary" || echo "No changes to commit"
          git push

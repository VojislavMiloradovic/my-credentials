name: Inspect Microsoft Learn Data

on:
  workflow_dispatch: # Allows us to run this manually with a single click!

permissions:
  contents: write # Gives the action permission to commit the output file back to your repo

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.10'

      - name: Run Inspector Script
        run: python inspect_data.py

      - name: Commit Structure Summary
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/structure_summary.txt
          git commit -m "chore: auto-generate JSON structure summary" || echo "No changes to commit"
          git push

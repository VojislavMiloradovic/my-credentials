name: Sync LinkedIn Profile Credentials Archive

on:
  push:
    paths:
      - 'data/Certifications.csv'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-refresh-linkedin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Assets
        uses: actions/checkout@v4

      - name: Initialize Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process Profile Certifications Matrix
        run: |
          python update_linkedin.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update credential chunks"
          git push
